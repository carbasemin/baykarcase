{{- if .Values.alertRules.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ .Values.alertRules.name | default "mern-alerts" }}
  namespace: {{ .Values.namespace }}
  labels:
    app: prometheus
    chart: monitoring
    heritage: Helm
spec:
  groups:
{{- range .Values.alertRules.groups }}
    - name: {{ .name | default "default-alerts" }}
      rules:
{{- range .rules }}
        - alert: {{ .alert }}
          expr: {{ .expr }}
          for: {{ .for | default "0m" }}
          labels:
{{- range $key, $value := .labels }}
            {{ $key }}: {{ $value }}
{{- end }}
          annotations:
{{- range $key, $value := .annotations }}
            {{ $key }}: {{ $value }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
