apiVersion: v1
kind: Service
metadata:
  name: mern-backend
  namespace: {{ .Values.namespace }}
  labels:
    app: mern-backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.port }}
      protocol: TCP
      name: http
  selector:
    app: mern-backend
