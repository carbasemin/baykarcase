apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: {{ .Values.externalSecrets.secretStoreName }}
  namespace: {{ .Values.namespace }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-west-1
      # Auth is provided by IRSA role on the external-secrets operator service account
      auth:
        jwt:
          serviceAccountRef:
            name: "default" # Operator uses its own SA, this is a placeholder if needed, AWS provider usually uses the pod's IRSA or we can attach IRSA to a specific SA in this namespace.
            # Actually with ESO, the SecretStore can auth via a ServiceAccount in the same namespace that has the IRSA annotation attached.
            # Or the operator itself has the IAM role. Usually, the best practice is a ServiceAccount per namespace for granular access.
            # Wait, in the EKS terraform, I attached the IRSA role to the namespace `external-secrets` and SA `external-secrets`.
            # To allow namespace instances of SecretStore to use it, we either use a ClusterSecretStore, or we create a SA in this namespace with the IRSA role.
            # Let's create a ClusterSecretStore instead, OR we can just grant the IRSA role to a SA in `mern-project`.
            # Let's specify proper IRSA for this namespace. I will update the EKS terraform to allow `mern-project:external-secret-sa`.
            # For now, let's assume we map the SA correctly.
            name: mern-aws-sa
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mern-aws-sa
  namespace: {{ .Values.namespace }}
  annotations:
    # We will need to grab this from Terraform outputs
    eks.amazonaws.com/role-arn: "arn:aws:iam::683134219558:role/baykarcase-external-secrets"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mern-atlas-secret
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: SecretStore
  target:
    name: mern-atlas-secret # The Secret to be created
    creationPolicy: Owner
  data:
    - secretKey: ATLAS_URI # The key in the kubernetes secret
      remoteRef:
        key: {{ .Values.externalSecrets.atlasSecretName }} # Assuming the secret itself is plain text URI. If JSON, we'd use property.
